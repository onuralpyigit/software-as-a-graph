name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (CPU torch + all extras + dev)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch wheel: ~200 MB vs ~2 GB CUDA build.
          # Pinned ahead of [gnn] extras so the resolver does not pull the CUDA build.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[neo4j,gnn,api,dev]"

      - name: Run pytest
        run: pytest --tb=short -q
