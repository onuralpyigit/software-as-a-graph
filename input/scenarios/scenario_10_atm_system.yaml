# =============================================================================
# Scenario 10 — Air Traffic Management (ATM) / ICAO SWIM
# =============================================================================
# Domain   : Safety-critical Air Traffic Management (ICAO Global Concept)
# Scale    : Medium (26 apps, 27 topics, 5 brokers, 8 nodes)
# Purpose  : Validate criticality prediction in ultra-reliable real-time
#            surveillance and separation management systems.
#
# Topology fingerprint:
#   • Ultra-high RELIABLE QoS (90%+ of traffic)
#   • Many-to-few consumer ratio (HMI and FDP nodes consume many sensor streams)
#   • High criticality density (70% of nodes are mission-critical)
#   • Large message sizes for weather and flight plans
#
# Expected analysis outcomes:
#   • Surveillance processors (Radar/ADS-B) score in the TOP percentile
#   • Conflict Detection acts as a primary architectural hub
#   • High QoS weight due to "critical" transport priority distribution
#
# Usage:
#   python bin/generate_graph.py --config input/scenarios/scenario_10_atm_system.yaml \
#          --output output/atm_system.json
# =============================================================================

graph:
  seed: 42
  domain: air_traffic_management
  scenario: icao_global_atm_concept

  counts:
    nodes: 8
    applications: 26
